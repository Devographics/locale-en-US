locale: en-US
translations:
  - key: general.ai2026.devs2025_banner
    t: >
      Announcing a new developer survey for everything that's *not* code: health, hobbies, career, and more! →

  - key: general.ai2026.survey_intro
    t: |

      We have been six months away from being replaced by AI for a few years now, and that means one of two things: either those doomsday predictions were overblown and will never come true; *or* they were right all along and programmers are closer than ever to joining lamplighters and elevator operators in the dustbin of history. 

      Or maybe the truth is somewhere in between and our jobs will change but not quite disappear; while some of us adapt to the new status quo and some of us leave programming behind, finally fulfilling our life-long dream of becoming woodworkers. 

      In the meantime, all we can do is try our best to figure out where things stand, and that starts with taking this second edition of the State of Web Dev AI survey!

  - key: overview.intro.ai2026
    t: |

      Whether you're pro- or anti-AI, I think most of us agree that AI is having a huge impact on our work as developers, and beyond that, on the world at large. 

      The 2026 edition of the State of Web Dev AI survey provided a lot of fascinating material to study this impact, and while I certainly recommend checking out the full survey results at your own pace, here are four key trends to get started exploring the data.

  - key: overview.ai_adoption.ai2026
    t: |
      ## #1: Growing AI Adoption

      It's important to acknowledge that open surveys such as this one can suffer from inherent selection bias. In other words, an AI-focused survey is probably more likely to be filled out by developers who already use and care about AI. 

      With that caveat in mind, if we assume that the trends revealed here apply to the industry at large then AI-assisted coding's transition from an early-adopter experiment to a standard practice is now well underway.

      This becomes clear when looking at [the proportion of AI-generated code produced by respondents](/en-US/usage/#ai_generated_code_balance), which has jumped from **28%** on average in 2025 to **56%** this year, with the 75%+ segments seeing the highest growth (delta from the previous year shown by striped bar overlays).

  - key: overview.ai_adoption2.ai2026
    t: |
      Similarly, respondents are also using AI much more often, with the percentage of respondents [stating they use AI “constantly”](/en-US/usage/#ai_code_generation_frequency) doubling year-over-year.

  - key: overview.coding_agents.ai2026
    t: |
      ## #2: Claude Code & the Rise of Coding Agents

      This adoption is in large part driven by a new generation of coding agents and assistants, with **Claude Code** taking the lead when looking at [positive respondent sentiment regarding coding agents](/en-US/coding-agents-assistants/#coding_agents_assistants_experience).

  - key: overview.coding_agents2.ai2026
    t: |

      These agents are emerging as a more convenient way to interact with LLMs, and potentially replacing chatbots, app generators, and other specialized tools.

      As a consequence, despite **ChatGPT** having the edge in terms of sheer popularity, **Claude** is [the model that developers actually pay for the most](/en-US/models/#models_paid_for).

  - key: overview.monetization.ai2026
    t: |
      ## #3: Race to Monetization 

      Now that we've all gotten hooked on cheap AI subsidized by unprecedented VC funding rounds, our collective addiction is making it easier for AI labs to start raising prices. And this translates into a [clear increase in individual AI spend](/en-US/usage/#ai_personal_expenses) compared to last year.

  - key: overview.monetization_2.ai2026
    t: |
      Only time will tell if this increased monetization will justify the current eye-popping AI company valuations, or if they instead mean we're in the midst of [an AI bubble](/en-US/opinions/#ai_bubble_currently). But either way, survey respondents certainly think that we are.

  - key: overview.risk_factors.ai2026
    t: |
      ## #4: Increased Risk Factors

      It would be irresponsible to talk about AI progress without also mentioning the many issues stemming from all these advances. 

      There is a real risk that many of us will [lose our livelihood](/en-US/opinions/#job_security_threat) because of AI improvements. After all, whether AI can actually do our jobs or not, all that's required for developers to be replaced is that management *believes* it can.

  - key: overview.risk_factors2.ai2026
    t: |
      But the list of [AI risks](/en-US/risks-pain-points/#ai_risks) does not stop there. 

      Right now, armed forces throughout the world are working on autonomous drones and targeting systems that free them from the heavy responsibility of weighing the cost of human life; and all of this is of course happening against a backdrop of accelerating climate change made worse by AI's ever-increasing resource consumption.

  - key: overview.risk_factors3.ai2026
    t: |
      Even if you discount these externalities, as we rely on AI more and more, it's hard to shake the feeling that maybe our new cyber-buddies aren't being fully truthful with us, with **hallucinations and inaccuracies**  being cited as the [most common AI pain points](/en-US/risks-pain-points/#ai_pain_points).

  - key: overview.ai_future.ai2026
    t: |
      ## The AI Future Is Here Whether We Want It or Not

      I'll be honest: I'm not sure where all this leaves us. But whether you think we should be embracing AI, fighting it, or maybe something in between, one thing's for sure: it's becoming increasingly difficult to ignore it. 

      So if like me you haven't quite made up your mind on this complex topic, hopefully [these survey results](/en-US/models/) can be one more data point that will help you make more informed decisions–without having to ask ChatGPT first. 

      <span class="conclusion__byline">– Sacha Greif</span>

  # FAQ

  - key: faq.results_released_ai2026
    t: When will the results be released?
  - key: faq.results_released_ai2026.description
    t: The survey will run from April 10 to May 10, 2026, and the survey results will be released shortly after.

  - key: faq.survey_design_ai2026
    t: How was this survey designed?
  - key: faq.survey_design_ai2026.description
    t: >
      This survey was designed as the results of an [open design process](https://github.com/Devographics/surveys/issues/285) involving AI companies, browser vendors and the web development community.

  ###########################################################################
  # Content & Takeaways
  ###########################################################################

  # user_info

  - key: sections.user_info.description.ai2026
    t: |
      **4,181** respondents took part in this first edition of the State of Web Dev AI survey.

  # models

  - key: sections.models.description.ai2026
    t: |
      The foundation on which the entire ecosystem is built.

  - key: models.models_experience.takeaway.ai2026
    t: |
      While **ChatGPT** is still the most-used model family, this year **Claude** is the one that garners the most positive sentiment–a preview of a theme that will echo throughout these survey results. 

      On the other side of the spectrum **Grok** is the most-hated model, with many commenters opposing it on moral grounds alone due to its connection with Elon Musk and right-wing ideology.

  - key: models.models_ratios.takeaway.ai2026
    t: |
      **ChatGPT** is still the most-used model, but both **Claude** and **Gemini** have seen huge year-over-year progress. 

      Looking at satisfaction confirms the trend: **Claude** maintains its top position, and while **ChatGPT** is still second for now it's losing points at a worrying rate, while **Gemini** stands out as the one model that's actually *gained* percentage points since last year.

  - key: models.models_others.takeaway.ai2026
    t: |
      Most other models cited here were not even part of last year's survey, and it's notable that the top three (**Kimi**, **GLM**, and **MiniMax**) are all being developed by companies based in China,indicating that the future of AI might not belong exclusively to Silicon Valley after all.

  - key: models.cardinalities.takeaway.ai2026
    t: |
      The fact that the average respondent has used 4.2 [TODO] different models points to the fact that the AI space is very much still in flux, with users being more than willing to experiment and jump ship to new competitors if they should prove superior.

  - key: models.models_paid_for.takeaway.ai2026
    t: |
      Having the highest amount of positive sentiment was already a great win for **Claude**, but the fact that it also tops the list of the models people are actually paying for means Anthropic is definitely doing something right.

  # coding_agents_assistants

  - key: coding_agents_assistants.coding_agents_assistants_experience.takeaway.ai2026
    t: |
      Once again Claude shows a clear lead over the competition in terms of positive sentiment, with **Claude Code** topping the rankings even if **GitHub Copilot** technically has a larger user base.

  - key: coding_agents_assistants.coding_agents_assistants_ratios.takeaway.ai2026
    t: |
      **Claude Code** and **OpenAI Codex** are neck-and-neck in terms of respondent satisfaction, but the Anthropic coding tool is actually used way more than its rival.

  - key: coding_agents_assistants.coding_agents_assistants_others.takeaway.ai2026
    t: |
      Given its popularity, **OpenCode** should probably have been part of the main survey options. But it makes up for that omission by establishing a comfortable lead over the competition here, with **Cursor** a close second.

  - key: coding_agents_assistants.cardinalities.takeaway.ai2026
    t: |
      With a younger and more limited space, it's not surprising that developers have still tried a relatively limited number of coding agents.

  - key: coding_agents_assistants.coding_agents_assistants_paid_for.takeaway.ai2026
    t: |
      Echoing results from the Models section, **Claude Code** also comes in first when it comes which coding assistants developers are willing to open their wallets for.

  # other_tools

  - key: sections.other_tools.description.ai2026
    t: Other AI Tools

  - key: other_tools.ai_programming_languages.takeaway.ai2026
    t: |
      Confirming a trend seen in other surveys, **TypeScript** is now the de facto programming language of the web, at least as far as AI is concerned.

  - key: other_tools.image_generation.takeaway.ai2026
    t: |
      **Nano Banana** is quite popular for image generation, but many respondents simply don't use these tools at all, in large part for ethical reasons. As one commenter put it succintly: “[AI image generators are] gross, immoral and resource intensive”.

  - key: other_tools.video_generation.takeaway.ai2026
    t: |
      With OpenAI shutting down **Sora** recently,  AI video generation seems to have fallen short of its promises, a trend confirmed here. As that same comments declared: “Even more gross.”

  - key: other_tools.app_generation.takeaway.ai2026
    t: |
      There's no shortage of tools promising to generate an entire app based on a single prompt, but the rise of actual coding assistants is threatening to make that entire sector obsolete, at least when it comes to professional web developers.

  - key: other_tools.code_review.takeaway.ai2026
    t: |
      As AI makes generating lines of codes by the thousands easier than ever, it might not be a bad idea to improve how we review all that code, and **CodeRabbit** is leading the effort here.

  - key: other_tools.text_editors.takeaway.ai2026
    t: |
      While **Cursor** is still trying to demonstrate the benefits of a dedicated AI-optimized IDE, the majority of respondents still embrace **VS Code** as their editor of choice.

  - key: other_tools.ai_browser_apis.takeaway.ai2026
    t: |
      Native browser support for AI features is an appealing idea, promising to speed up latency and potentially being more environmentally friendly, reducing the need for new datacenters.

  - key: other_tools.ai_tools_others.takeaway.ai2026
    t: |
      **OpenCode** shows up once more in the top spot, while the much-hyped **OpenClaw** only takes fifth place [TODO].

  # usage

  - key: sections.usage.description.ai2026
    t: |
      How developers use AI.

  - key: usage.ai_uses.takeaway.ai2026
    t: |
      While **code generation** still comes first, it's interesting to note that **code review** (a new option this year) has jumped straight to third place. After all, *someone* will eventually need to read through the 30k lines of codes the intern vibe-coded over the week-end…

  - key: usage.ai_generated_code_balance.takeaway.ai2026
    t: |
      The difference with last year is striking here. Back then the average respondent was using AI sporadically to generate a small percentage of their code, but today that same developer is much more likely to rely on AI for the bulk of their coding.

  - key: usage.ai_generated_code_refactoring.takeaway.ai2026
    t: |
      Similarly, using AI-generated code without having to refactor it first is no longer the exception, with many respondents reporting only needing to refactor around 25% of AI output.

  - key: usage.ai_code_refactoring_reasons.takeaway.ai2026
    t: |
      When respondents *do* need to refactor AI-generated code, the culprits tend to be **poor code style** and **hallucinations**. Interestingly, **variable renaming** does not seem to be as much of a factor anymore, pointing to the fact that LLMs are getting better at following instructions and learning from existing codebases.

  - key: usage.ai_code_generation_frequency.takeaway.ai2026
    t: |
      It seems clear that AI has become embedded in our work, with a majority of respondents using it multiple times per day, and a growing segment using it constantly.

  - key: usage.ai_other_tasks_frequency.takeaway.ai2026
    t: |
      While the main focus of this survey is coding, other AI uses are also seeing increased used compared to last edition. After all if you trust AI with the main part of your job, it does seems logical to trust it with everything else, too.

  - key: usage.ai_generated_code_type.takeaway.ai2026
    t: |
      Almost every type of generated code saw an increase compared to last survey, with tests in particular becoming a key reason to use AI.

  - key: usage.ai_personal_expenses.takeaway.ai2026
    t: |
      The proportion of respondents enjoying the benefits of AI without personally having to spend their hard-earned cash has dramatically shrunken year-over-year; while the **$100-$500** monthly spend demographic is seeing significant growth. This may be due to the rise of coding agents, which often carry heavier financial costs compared to simple chatbots.

  - key: usage.industry_sector.takeaway.ai2026
    t: |
      Don't hesitate to use our built-in **Query Builder** on any *other* chart to filter these survey results according to any specific industry sector.

  - key: usage.ai_running_locally.takeaway.ai2026
    t: |
      More and more respondents have tried local AI models, and while they aren't as powerful as their cloud-based cousins right now, there is strong potential for disruption as they provide a cheaper alternative to traditional frontier labs models.

  # risks_pain_points

  - key: risks_pain_points.ai_risks.takeaway.ai2026
    t: |
      The AI industry has never been shy about discussing the technology's potential for disaster, sadly stopping just short of actually, you know, *slowing down* for a minute. 

      Said risks include **job displacement** as a top concern, but also AI's potential for **military use** as seen in recent conflicts, and of course the worrying **environmental impact** of AI in a world already threatened by climate change. 

      Many commenters complained about being limited to selecting only three items. As one person put it: “It's kind of shocking how big this list of negative social impacts are when you put them all in one place.”

  - key: risks_pain_points.ai_pain_points.takeaway.ai2026
    t: |
      When it comes to issues with actually using AI, **Hallucinations** lead the pack. 

      What makes this issue uniquely frustrating is not just having to deal with incorrect results, but incorrect results confidently presented as *correct*, with the model having no awareness of its own potential for error.

  - key: risks_pain_points.ai_missing_features.takeaway.ai2026
    t: |
      Confirming the previous question's results, **Truthfulness** is the leading missing feature. In an age where we're growing increasingly skeptical of our fellow humans' ability to distinguish fact from fiction, it'd be nice if our AI at least wouldn't gaslight us as well.

  - key: risks_pain_points.ai_happiness.takeaway.ai2026
    t: |
      TODO

  # opinions

  - key: sections.opinions.description.ai2026
    t: Asking deeper questions

  - key: opinions.integral_workflow.takeaway.ai2026
    t: |
      We're way past the point where AI tools were a nice-to-have, take-it-or-leave-it addition to our daily workflows, with a majority respondents now relying on AI full stop.

  - key: opinions.more_productive.takeaway.ai2026
    t: |
      Even more than last year, a majority of respondents agree that AI tools have made them significantly more productive.

  - key: opinions.ai_reliance_worse_developers.takeaway.ai2026
    t: |
      Paradoxically, respondents are also well aware that reliance on AI will lead to poorer developer skills overall. But, as some commenters pointed out, AI itself might make up for that loss: “Less skilled yes. More capable on average also yes”.

  - key: opinions.job_security_threat.takeaway.ai2026
    t: |
      As respondents astutely pointed out, AI doesn't have to be able to replace you to be a threat to your job–all that's needed is that your boss thinks it can: the worry is that “AI companies can convince employers that AI can take my job, even if it can’t”.

  - key: opinions.existential_risk.takeaway.ai2026
    t: |
      Digging into the comments paints a nuanced picture on the question if existential AI risk, with the concensus being that the main problem isn't really AI itself, but rather how we use it.

  - key: opinions.ai_bubble_currently.takeaway.ai2026
    t: |
      Many respondents think we're currently in an AI bubble. But they also realize AI is here to stay, even after it eventually pops.

  - key: opinions.ai_quality_improving.takeaway.ai2026
    t: |
      Despite frequent gripes about such-and-such model being *completely ruined* by a recent update, it seems like respondents agree overall that we're seeing steady progress in terms of AI tool quality.

  - key: opinions.reach_agi.takeaway.ai2026
    t: |
      Depending on who you ask, we're either 6 months away from AGI, or we'll never reach it (as one comment put it, “LLMs are not the path to AGI. They never were.”)

      Overall though, one gets the feeling that despite AI researcher's obsession with reaching that elusive goal, the rest of us would be quite content to keep using our current “dumb” AI for a while, if it means bulldozing a few less rainforests in the process.

  # conclusion

  - key: conclusion.ai2026.ashok_gelal.bio
    t: Developer and Founder, [Msty](https://msty.app/)

  - key: conclusion.ai2026.ashok_gelal
    t: |
      Just like many of us, I was very skeptical of AI at first. Was AI a real game-changer, or just another fad like NFTs, Crypto, Web3, and so many others?

      Then OpenAI came out with ChatGPT. And when, shortly after, my 7th-grader niece mentioned their teacher was making plans to use it in the classroom, I knew something was different this time around. 

      And for a while there I thought OpenAI would run away with the whole market – but man, am I glad to be wrong! 

      Recent reasoning models from DeepSeek, mind-blowing image generative capabilities from Goolge Gemini, MCP Tools from Anthropic, etc. show that this is just the beginning, and that AI innovation is happening at an unprecedented pace. 

      As someone making an app on top of these models, I am super excited to see where this is all going to take us. Will AI replace us? I'm not sure. But I believe those of us who learn how to use it will definitely have an edge. 

      I wasn't around for the original internet boom, so I am not going to sit this one out. Now excuse me, as I need to check out a just-announced new model that is supposed to be faster, cheaper, and better than anything else out there!

